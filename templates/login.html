<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Bus System Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
  <button type="button" class="theme-toggle floating-theme-toggle" id="themeToggle" aria-label="Toggle dark mode">Dark Mode</button>
  <main class="login-shell single-column">
    <section class="login-panel">
      <div class="brand-lockup">
        <img src="{{ url_for('static', filename='img/gajoda-logo.svg') }}" alt="Gajoda Transportation Services logo">
        <div>
          <p class="brand-name">Gajoda Transportation Services</p>
          <p class="brand-sub">Crowd Analytics Monitoring System</p>
        </div>
      </div>
      <div class="panel-head">
        <h2>Sign In</h2>
        <p>Use your role account to open the right dashboard.</p>
      </div>

      {% if error %}
      <div class="message error">{{ error }}</div>
      {% endif %}

      <form method="POST" class="login-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>
          <span>Username or Email</span>
          <input type="text" name="username" placeholder="Enter username or email" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="Enter password" required>
        </label>
        <button type="submit">Login</button>
      </form>

      <div class="form-links">
        <a href="{{ url_for('forgot_password') }}">Forgot password</a>
        <a href="{{ url_for('landing') }}">Back to landing page</a>
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
