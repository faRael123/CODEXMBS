<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
  <button type="button" class="theme-toggle floating-theme-toggle" id="themeToggle" aria-label="Toggle dark mode"></button>
  <main class="login-shell single-panel">
    <section class="login-panel">
      <div class="panel-head">
        <h2>Reset Password</h2>
        <p>Set a new password for your Gajoda account.</p>
      </div>

      {% if message %}
      <div class="message success">{{ message }}</div>
      {% endif %}

      {% if error %}
      <div class="message error">{{ error }}</div>
      {% endif %}

      {% if token_valid %}
      <form method="POST" class="login-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>
          <span>New Password</span>
          <span class="password-field" data-password-field>
            <input type="password" name="password" placeholder="Enter new password" minlength="8" required>
            <button type="button" class="password-toggle" data-password-toggle aria-label="Show password">Show</button>
          </span>
        </label>
        <label>
          <span>Confirm Password</span>
          <span class="password-field" data-password-field>
            <input type="password" name="confirm_password" placeholder="Confirm new password" minlength="8" required>
            <button type="button" class="password-toggle" data-password-toggle aria-label="Show password">Show</button>
          </span>
        </label>
        <button type="submit">Update Password</button>
      </form>
      {% endif %}

      <div class="form-links">
        <a href="{{ login_url or url_for('login') }}">Back to login</a>
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  <script src="{{ url_for('static', filename='js/password-toggle.js') }}"></script>
</body>
</html>
