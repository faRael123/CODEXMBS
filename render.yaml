services:
  - type: web
    name: CODEXMBS
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class gthread --threads 100 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
